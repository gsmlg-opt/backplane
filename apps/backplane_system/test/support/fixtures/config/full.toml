[database]
url = "postgres://localhost/backplane_test"

[github]
token = "ghp_test123"
api_url = "https://api.github.com"

[github.enterprise]
token = "ghp_enterprise456"
api_url = "https://github.corp.example.com/api/v3"

[gitlab]
token = "glpat-test789"
api_url = "https://gitlab.com/api/v4"

[gitlab.self_hosted]
token = "glpat-selfhosted"
api_url = "https://git.internal.example.com/api/v4"

[[projects]]
id = "test-project"
repo = "github:test-org/test-repo"
ref = "develop"
parsers = ["elixir", "markdown"]
reindex_interval = "2h"
webhook_secret = "whsec_test"

[[projects]]
id = "minimal-project"
repo = "gitlab:group/project"

[[upstream]]
name = "filesystem"
transport = "stdio"
command = "npx"
args = ["-y", "@anthropic/mcp-filesystem"]
prefix = "fs"

[upstream.env]
HOME = "/home/user"

[[upstream]]
name = "postgres-mcp"
transport = "http"
url = "http://localhost:4200/mcp"
prefix = "pg"

[upstream.headers]
Authorization = "Bearer pg-token"

[[skills]]
name = "elixir-patterns"
source = "git"
repo = "github:test-org/skills"
path = "elixir/"
ref = "main"
sync_interval = "1h"

[[skills]]
name = "local-experiments"
source = "local"
path = "/tmp/test-skills"
