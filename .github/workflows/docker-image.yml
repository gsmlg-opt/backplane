name: Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
        type: string
      image_tag:
        description: "Docker image tag to publish"
        required: true
        default: "ghcr.io/gsmlg-dev/backplane:latest"
        type: string
      version:
        description: "Image version label, with or without leading v"
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      git_ref:
        description: "Git ref to build from"
        required: true
        type: string
      image_tag:
        description: "Docker image tag to publish"
        required: true
        type: string
      version:
        description: "Image version label, with or without leading v"
        required: false
        default: ""
        type: string
    secrets:
      GHCR_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.image_tag || 'ghcr.io/gsmlg-dev/backplane:latest' }}
  cancel-in-progress: true

jobs:
  docker-image:
    name: Build and publish image
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve workflow inputs
        id: workflow
        shell: bash
        env:
          DEFAULT_IMAGE_TAG: ghcr.io/gsmlg-dev/backplane:latest
          INPUT_GIT_REF: ${{ inputs.git_ref || github.ref_name }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag || '' }}
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          image_tag="$INPUT_IMAGE_TAG"

          if [[ -z "$image_tag" ]]; then
            image_tag="$DEFAULT_IMAGE_TAG"
          fi

          echo "git_ref=$INPUT_GIT_REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.workflow.outputs.git_ref }}

      - name: Resolve image metadata
        id: metadata
        shell: bash
        run: |
          version="${{ steps.workflow.outputs.version }}"
          version="${version#v}"

          if [[ -z "$version" ]]; then
            version="$(awk -F '"' '/^[[:space:]]*version:/ { print $2; exit }' mix.exs)"
          fi

          if [[ -z "$version" ]]; then
            echo "Could not resolve an image version" >&2
            exit 1
          fi

          build_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          revision="$(git rev-parse HEAD)"

          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"
          echo "git_ref=${{ steps.workflow.outputs.git_ref }}" >> "$GITHUB_OUTPUT"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.workflow.outputs.image_tag }}
          build-args: |
            BUILD_DATE=${{ steps.metadata.outputs.build_date }}
            GIT_REF=${{ steps.metadata.outputs.git_ref }}
            VCS_REF=${{ steps.metadata.outputs.revision }}
            VERSION=${{ steps.metadata.outputs.version }}
          labels: |
            org.opencontainers.image.created=${{ steps.metadata.outputs.build_date }}
            org.opencontainers.image.ref.name=${{ steps.metadata.outputs.git_ref }}
            org.opencontainers.image.revision=${{ steps.metadata.outputs.revision }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.version }}
