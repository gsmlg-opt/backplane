name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      PGHOST: /var/run/postgresql

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Start PostgreSQL with pgvector
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-server-dev-all build-essential
          # Build pgvector 0.8.0 from source — Ubuntu apt ships < 0.7.0 which lacks halfvec
          git clone --branch v0.8.0 --depth 1 https://github.com/pgvector/pgvector.git /tmp/pgvector
          make -C /tmp/pgvector
          sudo make -C /tmp/pgvector install
          sudo systemctl start postgresql
          sudo -u postgres createuser --superuser "$USER" || true
          pg_isready -h "$PGHOST"

      - name: Run tests
        run: |
          mix do --app backplane cmd mix test test/backplane/services/web_fetch_test.exs
          mix do --app day_ex cmd mix test
          mix do --app relayixir cmd mix test
          mix do --app backplane_memory cmd mix test
